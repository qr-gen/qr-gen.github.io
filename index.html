<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    #qrcode {
      margin-bottom: 10px;
    }
    #link {
      padding: 5px;
      font-size: 16px;
      text-align: center;
      width: 300px;
    }
    #link:focus {
      outline: none;
    }
  </style>
</head>
<body>
  <canvas id="qrcode"></canvas>
  <input id="link" placeholder="://">

  <script>
    const canvas = document.getElementById('qrcode');
    const input = document.getElementById('link');
    
    function createQRCode() {
      new QRious({
        element: canvas,
        value: input.value,
        size: 300
      });
    }

    input.addEventListener('input', createQRCode);
    createQRCode();
  </script>
</body>
</html>
